dataset = "firefox_desktop"

# Source tables define the BigQuery tables and their schema used for feature monitoring.
# Each source table specifies:
#   - analysis_unit_id: the field used to identify analysis units (e.g. client/profile IDs)
#   - table_name: the BigQuery table name within the dataset
#   - type: one of "metrics", "event_stream", or "clients_daily"
#   - dimensions: optional per-table dimensions to group metrics by

[source_tables.firefox_desktop_metrics]
analysis_unit_id = "metrics.uuid.legacy_telemetry_profile_group_id"
table_name = "metrics"
type = "metrics"

[source_tables.firefox_desktop_metrics.dimensions.app_display_version]
field = "client_info.app_display_version"

[source_tables.firefox_desktop_metrics.dimensions.app_version_major]

[source_tables.firefox_desktop_metrics.dimensions.app_version_minor]

[source_tables.firefox_desktop_metrics.dimensions.app_version_patch]

[source_tables.firefox_desktop_metrics.dimensions.locale]
field = "client_info.locale"

[source_tables.firefox_desktop_metrics.dimensions.normalized_channel]

[source_tables.firefox_desktop_metrics.dimensions.normalized_os]

[source_tables.firefox_desktop_metrics.dimensions.normalized_os_version]

[source_tables.firefox_desktop_metrics.dimensions.normalized_country_code]
value_in = ["CA", "DE", "FR", "GB", "US"]
default_value = "OTHER"

[source_tables.firefox_desktop_events_stream]
analysis_unit_id = "profile_group_id"
table_name = "events_stream"
type = "event_stream"

[source_tables.firefox_desktop_newtab]
analysis_unit_id = "metrics.uuid.legacy_telemetry_profile_group_id"
table_name = "newtab"
type = "metrics"

# Features define which metrics to collect from which source tables.
# Each feature maps to metrics grouped by source table and data type.
# For boolean, quantity, and labeled_* types: keys are metric names.
# For event type: keys are categories, then event names.

["features"."address-autofill-feature"."metrics_by_source"."firefox_desktop_metrics".boolean]
formautofill_availability = {}

["features"."address-autofill-feature"."metrics_by_source"."firefox_desktop_metrics"."labeled_counter"."login_autofill"]
field = "metrics.labeled_counter.pwmgr_form_autofill_result"
aggregators = ["sum", "avg"]
label_in = ["filled", "filled_username_only_form"]

["features"."address-autofill-feature"."metrics_by_source"."firefox_desktop_metrics".quantity]
formautofill_addresses_autofill_profiles_count = {}

["features"."address-autofill-feature"."metrics_by_source"."firefox_desktop_events_stream".event.address]
detected_address_form = {}
popup_shown_address_form = {}
filled_address_form = {}
filled_on_fields_update_address_form = {}
filled_modified_address_form = {}
submitted_address_form = {}
cleared_address_form = {}
detected_address_form_ext = {}
filled_address_form_ext = {}
submitted_address_form_ext = {}

["features"."address-autofill-feature"."metrics_by_source"."firefox_desktop_events_stream".event.formautofill]
iframe_layout_detection = {}

[features.newtabTrainhopAddon."metrics_by_source".firefox_desktop_newtab.event.newtab]
opened = {}

[features.newtabSponsoredContent."metrics_by_source".firefox_desktop_newtab.boolean]
pocket_is_signed_in = {}
pocket_enabled = {}
pocket_sponsored_stories_enabled = {}
topsites_enabled = {}
topsites_sponsored_enabled = {}

[features.newtabSponsoredContent."metrics_by_source".firefox_desktop_newtab.quantity]
topsites_rows = {}
topsites_sponsored_tiles_configured = {}

[features.newtabSponsoredContent."metrics_by_source".firefox_desktop_newtab.event.pocket]
click = {}
impression = {}
dismiss = {}
