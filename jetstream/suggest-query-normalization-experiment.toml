# Custom Jetstream config for: suggest-query-normalization-experiment (Firefox Desktop)
# Per-provider urlbar match-rate (success) + CTR (guardrail) for 'market' (finance)
# and 'sports'. Stays on the daily rollup tables (no raw urlbar_events -> no timeout).
#
# Fixes vs the previous version:
#  - Impression/click numerators now read the per-product table UNFILTERED and pivot
#    per provider, so clients who never saw the provider count as 0 (previously they
#    were dropped, so the metric averaged over "seers" only and inflated the rate —
#    badly for rare providers like sports).
#  - Match-rate denominator is now TRUE urlbar sessions from urlbar_events_daily,
#    not COUNT(1) of product-type rows.
# CTR is unchanged (it was already correct: clicks/impressions from the same rows).

[experiment]
[experiment.exposure_signal]
name = "exposed_to_market_or_sports"
friendly_name = "Exposed to a market or sports result"
description = "Clients with at least one market (finance) or sports urlbar impression."
select_expression = "(product_result_type IN ('market','sports')) AND (urlbar_impressions > 0)"
data_source = "urlbar_product_results"
window_end = "analysis_window_end"

[metrics]
weekly = [
  "total_urlbar_sessions",
  "market_impressions", "market_clicks", "market_match_rate", "market_ctr",
  "sports_impressions", "sports_clicks", "sports_match_rate", "sports_ctr",
  "search_count", "active_hours",
]
overall = [
  "total_urlbar_sessions",
  "market_impressions", "market_clicks", "market_match_rate", "market_ctr",
  "sports_impressions", "sports_clicks", "sports_match_rate", "sports_ctr",
  "search_count", "active_hours",
]

# --- Numerators: pivot the UNFILTERED per-product table (zero-fills non-seers) ---
[metrics.market_impressions]
friendly_name = "Finance (market) impressions"
description = "Per client: urlbar sessions that surfaced a market result (0 if none)."
select_expression = "SUM(IF(product_result_type = 'market', urlbar_impressions, 0))"
data_source = "urlbar_product_results"
[metrics.market_impressions.statistics.bootstrap_mean]

[metrics.market_clicks]
friendly_name = "Finance (market) clicks"
description = "Per client: clicks on a market result (0 if none)."
select_expression = "SUM(IF(product_result_type = 'market', urlbar_clicks, 0))"
data_source = "urlbar_product_results"
[metrics.market_clicks.statistics.bootstrap_mean]

[metrics.sports_impressions]
friendly_name = "Sports impressions"
description = "Per client: urlbar sessions that surfaced a sports result (0 if none)."
select_expression = "SUM(IF(product_result_type = 'sports', urlbar_impressions, 0))"
data_source = "urlbar_product_results"
[metrics.sports_impressions.statistics.bootstrap_mean]

[metrics.sports_clicks]
friendly_name = "Sports clicks"
description = "Per client: clicks on a sports result (0 if none)."
select_expression = "SUM(IF(product_result_type = 'sports', urlbar_clicks, 0))"
data_source = "urlbar_product_results"
[metrics.sports_clicks.statistics.bootstrap_mean]

# --- Denominator: TRUE urlbar sessions from the daily totals rollup ---
[metrics.total_urlbar_sessions]
friendly_name = "Total urlbar sessions"
description = "Per client: total urlbar sessions (urlbar_events_daily.urlbar_sessions)."
select_expression = "SUM(urlbar_sessions)"
data_source = "urlbar_sessions_daily"
[metrics.total_urlbar_sessions.statistics.bootstrap_mean]

# --- SUCCESS: match rate = provider impressions / total sessions ---
[metrics.market_match_rate]
friendly_name = "Finance (market) match rate"
description = "sum(market impressions) / sum(total urlbar sessions)."
depends_on = ["market_impressions", "total_urlbar_sessions"]
[metrics.market_match_rate.statistics.population_ratio]
numerator = "market_impressions"
denominator = "total_urlbar_sessions"
drop_highest = 0.001

[metrics.sports_match_rate]
friendly_name = "Sports match rate"
description = "sum(sports impressions) / sum(total urlbar sessions)."
depends_on = ["sports_impressions", "total_urlbar_sessions"]
[metrics.sports_match_rate.statistics.population_ratio]
numerator = "sports_impressions"
denominator = "total_urlbar_sessions"
drop_highest = 0.0

# --- GUARDRAIL: CTR = provider clicks / provider impressions (unchanged) ---
[metrics.market_ctr]
friendly_name = "Finance (market) CTR"
description = "sum(market clicks) / sum(market impressions)."
depends_on = ["market_clicks", "market_impressions"]
[metrics.market_ctr.statistics.population_ratio]
numerator = "market_clicks"
denominator = "market_impressions"
drop_highest = 0.001

[metrics.sports_ctr]
friendly_name = "Sports CTR"
description = "sum(sports clicks) / sum(sports impressions)."
depends_on = ["sports_clicks", "sports_impressions"]
[metrics.sports_ctr.statistics.population_ratio]
numerator = "sports_clicks"
denominator = "sports_impressions"
drop_highest = 0.0

# --- Data sources: both are daily rollups (no raw urlbar_events) ---

# Per-product engagement, UNFILTERED by provider so every urlbar-active client
# has rows -> non-seers pivot to 0 instead of being dropped.
[data_sources.urlbar_product_results]
from_expression = """(
  SELECT client_id, profile_group_id, submission_date,
         product_result_type, urlbar_impressions, urlbar_clicks
  FROM `mozdata.firefox_desktop.urlbar_events_daily_engagement_by_product_result_type`
)"""
experiments_column_type = "none"
friendly_name = "Urlbar daily engagement by product result type"
description = "Per client/day/product-type impressions and clicks (all providers)."

# True per-client/day urlbar session count (match-rate denominator).
# There is NO pre-aggregated per-client session count: the urlbar_events_daily
# view drops urlbar_sessions (SELECT * EXCEPT (urlbar_sessions)), and the v2
# derived table aggregates sessions by dimensions with no client_id. So we
# compute it from raw urlbar_events — but only a grouped COUNT(DISTINCT event_id),
# WITHOUT UNNEST(results), so it's far cheaper than the original all-raw approach.
[data_sources.urlbar_sessions_daily]
from_expression = """(
  SELECT
    legacy_telemetry_client_id AS client_id,
    profile_group_id,
    submission_date,
    COUNT(DISTINCT event_id) AS urlbar_sessions
  FROM `mozdata.firefox_desktop.urlbar_events`
  WHERE is_terminal
    AND normalized_channel = 'release'
  GROUP BY 1, 2, 3
)"""
experiments_column_type = "none"
friendly_name = "Urlbar daily session totals"
description = "Per client/day terminal urlbar sessions (denominator for match rate)."