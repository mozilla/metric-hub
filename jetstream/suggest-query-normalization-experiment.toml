# Pre-aggregated per-provider sources (one row per client/day/provider).
# Sourced from urlbar_events_daily_engagement_by_product_result_type to avoid the
# raw urlbar_events table, which is too large and times out the analysis.

# Combined market+sports source, used by the exposure_signal so exposure can span
# both providers. One row per client/day/provider for market or sports.
[data_sources.urlbar_clients_market_or_sports]
from_expression = """(
  SELECT
    client_id,
    profile_group_id,
    submission_date,
    product_result_type,
    SUM(urlbar_impressions) AS urlbar_impressions,
    SUM(urlbar_clicks) AS urlbar_clicks

  FROM
    `mozdata.firefox_desktop.urlbar_events_daily_engagement_by_product_result_type`
  WHERE
    product_result_type IN ('market', 'sports')
  GROUP BY ALL
)"""
experiments_column_type = "none"
friendly_name = "urlbar clients for market or sports result types"
description = "Table filtered for market or sports product result types, for exposure."

