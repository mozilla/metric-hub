# === TEST BRANCH `test-glean-vs-legacy-metrics` — METRICS/STATS/SEGMENTS DISABLED ===
# For the Legacy<->Glean guardrail comparison, all metric resolution is driven by the
# trimmed jetstream/defaults/firefox_desktop.toml ONLY. Config-level metrics, statistics,
# metric-only data sources, and segments are commented out below (NOT deleted) so they
# can be restored by stripping the leading '# '. Experiment scaffolding (analysis_unit,
# enrollment_query, exposure_signal + the data source it needs) is left active.
# Do NOT merge this branch.

# Custom Jetstream config for: suggest-query-normalization-experiment (Firefox Desktop)
# Replicates the Query Normalization analysis on-platform. Per-provider rates via
# population_ratio. Providers: 'market' (finance), 'sports'.
#
# Data sources: the raw urlbar_events table is too large and times out the analysis,
# so metrics are sourced from the pre-aggregated
# urlbar_events_daily_engagement_by_product_result_type table, pre-filtered per
# provider (one row per client/day/provider with summed impressions and clicks).
#
# Winsorization uses the standard population_ratio drop_highest (no bespoke caps),
# applied per provider by data density:
#   Finance ('market'): drop_highest = 0.001 — ~9% of clients see a market result,
#     dense enough for a standard 99.9th-pct trim.
#   Sports: drop_highest = 0.0 (unwinsorized) — only ~0.5% of clients ever see a
#     sports result, so any percentile trim degenerates (cap lands at 0 -> NaN).

[experiment]
# Exposed = had at least one market or sports impression. Sourced from the combined
# market+sports data source so exposure spans both providers.
[experiment.exposure_signal]
name = "exposed_to_market_or_sports"
friendly_name = "Exposed to a market or sports result"
description = "Clients with at least one urlbar impression of a market (finance) or sports result."
select_expression = "urlbar_impressions > 0"
data_source = "urlbar_clients_market_or_sports"
window_end = "analysis_window_end"


