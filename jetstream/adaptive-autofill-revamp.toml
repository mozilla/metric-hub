[experiment.exposure_signal]

name = "urlbar_usage"
friendly_name = "URL bar usage"
description = "Clients that engage with the URL bar"
data_source = "urlbar_usage_clients"
select_expression = '''COALESCE(urlbar_usage > 0, FALSE)'''

[metrics]
weekly = ["annoyances", "bounces", "autofill_impressions", "autofill_clicks", "autofill_ctr"]
overall = ["annoyances", "bounces", "autofill_impressions", "autofill_clicks", "autofill_ctr"]

[metrics.annoyances]
select_expression = "COALESCE(SUM(urlbar_annoyances) > 0, FALSE)"
data_source = "mozdata.firefox_desktop.urlbar_events_daily_engagement_by_product_result_type"

[metrics.annoyances.statistics.binomial]

[metrics.bounces]
select_expression = "COALESCE(SUM(urlbar_bounces) > 0, FALSE)"
data_source = "mozdata.firefox_desktop.urlbar_events_daily_engagement_by_product_result_type"

[metrics.bounces.statistics.binomial]

[metrics.autofill_impressions]
friendly_name = "Autofill impressions"
description = "Per client: urlbar impressions that surfaced an autofill result (0 if none)."
select_expression = "COALESCE(SUM(urlbar_impressions), 0)"
data_source = "urlbar_product_autofill"
[metrics.autofill_impressions.statistics.bootstrap_mean]

[metrics.autofill_clicks]
friendly_name = "Autofill clicks"
description = "Per client: clicks on an autofill result (0 if none)."
select_expression = "COALESCE(SUM(urlbar_clicks), 0)"
data_source = "urlbar_product_autofill"
[metrics.autofill_clicks.statistics.bootstrap_mean]

[metrics.autofill_ctr]
friendly_name = "Autofill CTR"
description = "sum(autofill clicks) / sum(autofill impressions)."
depends_on = ["market_clicks", "market_impressions"]
[metrics.autofill_ctr.statistics.population_ratio]
numerator = "autofill_clicks"
denominator = "autofill_impressions"
drop_highest = 0.001


[data_sources.urlbar_usage_clients]
from_expression = """(
  SELECT
    client_id,
    profile_group_id,
    submission_date,
    SUM(urlbar_impressions) as urlbar_usage,

  FROM
    `mozdata.firefox_desktop.urlbar_events_daily_engagement_by_product_result_type`

  GROUP BY ALL
)"""

experiments_column_type = "none"
friendly_name = "urlbar usage clients"
description = "Clients with terminal urlbar usage"

[data_sources.urlbar_product_autofill]
from_expression = """(
  SELECT client_id, 
         profile_group_id, 
         submission_date,
         SUM(urlbar_impressions) AS urlbar_impressions, 
         SUM(urlbar_clicks) AS urlbar_clicks
         
  FROM `mozdata.firefox_desktop.urlbar_events_daily_engagement_by_product_result_type`
  WHERE product_result_type IN ('about'autofill', 'adaptive_autofill')
  GROUP BY ALL
)"""
experiments_column_type = "none"
friendly_name = "Urlbar daily engagement for product result type autofill and autofill adaptive"
description = "Per client/day/product-type impressions and clicks (all providers)."