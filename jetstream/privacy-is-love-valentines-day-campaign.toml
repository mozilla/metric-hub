[experiment]

enrollment_period = 7
end_date = "2026-03-03"

segments = [
  "activity_infrequent",
  "activity_casual",
  "activity_core",
  "regular_users_v3",

  "profile_age_0_to_28_days",
  "profile_age_29_to_180_days",
  "profile_age_more_than_180_days",

  "os_windows",
  "os_mac",
  "os_linux",

  "country_tier_1",
  "country_tier_other",

  "not_default_at_exposure",
]

# Custom exposure signal: redefine "exposed" to exclude clients who were the
# default browser on the day of exposure. Treatment B's message-level targeting
# includes !isDefaultBrowser but Control/Treatment A do not, creating asymmetric
# exposure populations. This makes all branches symmetric by joining exposure
# events with baseline_clients_daily (Glean baseline ping, better coverage than
# legacy clients_daily) to check default status at exposure time.
[experiment.exposure_signal]
name = "non_default_exposure"
friendly_name = "Exposure among non-default-browser users"
description = "Nimbus exposure event, restricted to clients who were not the default browser on the day of exposure"
select_expression = "COALESCE(exposed AND NOT is_default_browser, FALSE)"
data_source = "exposure_with_default_status"
window_start = 0
window_end = "analysis_window_end"

[data_sources.exposure_with_default_status]
from_expression = """(
    SELECT
        es.client_id,
        es.legacy_telemetry_client_id,
        es.profile_group_id,
        DATE(es.submission_timestamp) AS submission_date,
        TRUE AS exposed,
        bcd.is_default_browser
    FROM `moz-fx-data-shared-prod.firefox_desktop.events_stream` es
    LEFT JOIN `moz-fx-data-shared-prod.firefox_desktop.baseline_clients_daily` bcd
        ON es.legacy_telemetry_client_id = bcd.legacy_telemetry_client_id
        AND bcd.submission_date = DATE(es.submission_timestamp)
    WHERE es.event_category = 'nimbus_events'
        AND es.event_name = 'exposure'
        AND JSON_EXTRACT_SCALAR(es.event_extra, '$.experiment') = 'privacy-is-love-valentines-day-campaign'
)"""
experiments_column_type = "none"
client_id_column = "legacy_telemetry_client_id"
analysis_units = ["profile_group_id", "client_id"]


[metrics]
weekly = ["opened_private_window"]
overall = ["opened_private_window"]

[metrics.opened_private_window]
data_source = "clients_daily"
select_expression = "COALESCE(MAX(CAST(dom_parentprocess_private_window_used AS int)), 0)"

[metrics.opened_private_window.statistics.binomial]


[segments]

[segments.not_default_at_exposure]
friendly_name = "Not default browser during analysis"
description = "Clients who were never the default browser during the analysis window"
select_expression = "COALESCE(LOGICAL_AND(NOT is_default_browser), FALSE)"
data_source = "clients_daily"

[segments.profile_age_0_to_28_days]
friendly_name = "Profile Age 0 to 28 days"
description = "Time since first-seen 0-28 days"
select_expression = "COALESCE(LOGICAL_OR(days_since_first_seen <= 28), FALSE)"
data_source = "clients_last_seen"

[segments.profile_age_29_to_180_days]
friendly_name = "Profile Age 29 to 180 days"
description = "Time since first-seen 29-180 days"
select_expression = "COALESCE(LOGICAL_OR(days_since_first_seen BETWEEN 29 AND 180), FALSE)"
data_source = "clients_last_seen"

[segments.profile_age_more_than_180_days]
friendly_name = "Profile Age more than 180 days"
description = "Time since first-seen more than 180 days"
select_expression = "COALESCE(LOGICAL_OR(days_since_first_seen > 180), FALSE)"
data_source = "clients_last_seen"

[segments.os_windows]
friendly_name = "Windows"
description = "Users on Windows"
select_expression = "COALESCE(LOGICAL_OR(LOWER(os) LIKE '%windows%'), FALSE)"
data_source = "clients_last_seen"

[segments.os_mac]
friendly_name = "Mac"
description = "Users on Mac"
select_expression = "COALESCE(LOGICAL_OR(LOWER(os) = 'darwin'), FALSE)"
data_source = "clients_last_seen"

[segments.os_linux]
friendly_name = "Linux"
description = "Users on Linux"
select_expression = "COALESCE(LOGICAL_OR(LOWER(os) = 'linux'), FALSE)"
data_source = "clients_last_seen"

[segments.country_tier_1]
data_source = "clients_daily"
friendly_name = "Country Tier 1"
description = "Clients from tier 1 countries (US, CA, GB, AU, IE, NZ)"
select_expression = """LOGICAL_OR(COALESCE(country IN ('US', 'CA', 'GB', 'AU', 'IE', 'NZ'), FALSE))"""

[segments.country_tier_other]
data_source = "clients_daily"
friendly_name = "Country Tier Other"
description = "Clients from non tier 1 countries (US, CA, GB, AU, IE, NZ)"
select_expression = """LOGICAL_AND(COALESCE(country NOT IN ('US', 'CA', 'GB', 'AU', 'IE', 'NZ'), TRUE))"""
