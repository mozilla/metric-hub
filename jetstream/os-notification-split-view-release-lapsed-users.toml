[experiment]
analysis_unit = "client_id"

enrollment_query = """
SELECT * FROM
(
-- Early data shows that the 'experiments' annotation is more robust than either
-- the 'enrollment' or the 'exposure' event in background update telemetry, see
-- [Bug 1809275](https://bugzilla.mozilla.org/show_bug.cgi?id=1809275).  That
-- is, some legacy client IDs do not report 'enrollment' or 'exposure' events,
-- but do appear in `experiments` annotations.  Therefore, we use 'enrollment'
-- events as our primary enrollment indicator but also look for an 'experiments'
-- annotation.
--
-- But, some legacy client IDs that click the notification do not correspond to
-- default profile IDs reported by background update pings: these may be due to
-- multiple profiles, multiple OS-level users, or telemetry errors.  Some amount
-- of such client IDs are anticipated.  We use a browsing telemetry query for
-- these legacy client IDs.
--
-- Finally, we take the earliest of these two enrollment signals to determine
-- enrollment date. This will always be before we witness a notification click,
-- so we should not have a legacy client ID that does not have at least one
-- analysis window containing a notification click.

(
SELECT
    JSON_VALUE(metrics, '$.uuid.background_update_client_id') AS analysis_id,
    JSON_VALUE(event_extra, '$.branch') AS branch,
    MIN(DATE(events.submission_timestamp)) AS enrollment_date,
    COUNT(events.submission_timestamp) AS num_enrollment_events
-- Query from events_stream because it's much more efficient than unnesting events.
FROM `moz-fx-data-shared-prod.firefox_desktop_background_update.events_stream` events
WHERE
    DATE(submission_timestamp) BETWEEN
        '{{experiment.start_date_str}}' AND
        -- Here we can restrict to the last enrollment date range.
        '{{experiment.last_enrollment_date_str}}'
    AND event_category = 'nimbus_events'
    AND event_name = 'enrollment'
    -- The background update experiment slug is exact.
    AND JSON_VALUE(event_extra, '$.experiment') = '{{experiment.normandy_slug}}'
    -- This should never happen, but belt-and-braces.
    AND JSON_VALUE(metrics, '$.uuid.background_update_client_id') IS NOT NULL
    AND sample_id < 100
GROUP BY analysis_id, branch
)

UNION ALL

(
SELECT
    m.metrics.uuid.background_update_client_id AS analysis_id,
    experiment.value.branch AS branch,
    MIN(DATE(submission_timestamp)) AS enrollment_date,
    -- These aren't discrete events, it makes no sense to count them.
    1 AS num_enrollment_events
-- We need to query from the Glean `background_update` table because pre-[Bug
-- 1794053](https://bugzilla.mozilla.org/show_bug.cgi?id=1794053) (scheduled for
-- Firefox 109) we don't have the legacy client ID in
-- `mozdata.firefox_desktop_background_update.events`.
FROM `mozdata.firefox_desktop_background_update.background_update` AS m
CROSS JOIN
    UNNEST(ping_info.experiments) AS experiment
WHERE
    -- Background update telemetry can be delayed, so we accept enrollment
    -- _submission_ dates during the elongated enrollment period.  It's safer to
    -- compare submission dates generated server-side than internal ping dates
    -- generated client-side.
    DATE(submission_timestamp) BETWEEN
        '{{experiment.start_date_str}}' AND
        '{{experiment.last_enrollment_date_str}}'
    -- The background update experiment slug is exact.
    AND experiment.key = '{{experiment.normandy_slug}}'
    AND sample_id < 100
GROUP BY analysis_id, branch
)

UNION ALL

(
SELECT
    client_id AS analysis_id,
    -- Post [Bug 1804988](https://bugzilla.mozilla.org/show_bug.cgi?id=1804988),
    -- this name looks like 'slug:branch'.
    SPLIT(mozfun.map.get_key(event_map_values, 'name'), ':')[SAFE_OFFSET(1)] AS branch,
    MIN(submission_date) AS enrollment_date,
    COUNT(submission_date) AS num_enrollment_events
FROM
    `mozdata.telemetry.events`
WHERE
    -- Browsing telemetry should not be delayed, but notification clicks need
    -- not coincide with actual enrollment.
    submission_date BETWEEN
        '{{experiment.start_date_str}}' AND
        '{{experiment.last_enrollment_date_str}}'
    AND event_category = 'browser.launched_to_handle'
    AND event_method = 'system_notification'
    AND event_object = 'toast'
    -- Post [Bug 1804988](https://bugzilla.mozilla.org/show_bug.cgi?id=1804988),
    -- this name looks like 'slug:branch'.
    AND STARTS_WITH(mozfun.map.get_key(event_map_values, 'name'), '{{experiment.normandy_slug}}:')
    AND sample_id < 100
GROUP BY
    analysis_id, branch
)

)
QUALIFY ROW_NUMBER() OVER (PARTITION BY analysis_id ORDER BY enrollment_date ASC) = 1
"""

segments = [
  "last_dau_28_to_34_days_ago",
  "last_dau_35_to_59_days_ago",
  "last_dau_60_to_119_days_ago",
  "last_dau_120_to_179_days_ago",
  "new_or_last_dau_180plus_days_ago",

  "fr_locale",
  "de_locale",
  "en_locale",

  "used_splitview_at_least_once",
  "never_used_splitview",
]

[metrics]
weekly = ["splitview_week_2_retention", "splitview_week_4_retention", "splitview_uri_count"]
overall = ["splitview_week_2_retention", "splitview_week_4_retention", "splitview_uri_count"]

[metrics.splitview_week_2_retention]
data_source = "splitview_feature_usage_retention"
select_expression = "LOGICAL_OR(COALESCE(week_2_retained, FALSE))"

[metrics.splitview_week_4_retention]
data_source = "splitview_feature_usage_retention"
select_expression = "LOGICAL_OR(COALESCE(week_4_retained, FALSE))"

[metrics.splitview_uri_count]
data_source = "metrics"
select_expression = "SUM(COALESCE(mozfun.map.extract_keyed_scalar_sum(metrics.labeled_counter.splitview_uri_count), 0))"

[metrics.splitview_week_2_retention.statistics.binomial]
[metrics.splitview_week_4_retention.statistics.binomial]
[metrics.splitview_uri_count.statistics.bootstrap_mean]


[segments]

[segments.fr_locale]
select_expression = """COALESCE(LOGICAL_OR(locale LIKE "fr%"), FALSE)"""
data_source = 'clients_daily'

[segments.de_locale]
select_expression = """COALESCE(LOGICAL_OR(locale LIKE "de%"), FALSE)"""
data_source = 'clients_daily'

[segments.en_locale]
select_expression = """COALESCE(LOGICAL_OR(locale LIKE "en-%"), FALSE)"""
data_source = 'clients_daily'

[segments.last_dau_28_to_34_days_ago]
friendly_name = "Last DAU 28 to 34 days ago"
description = "Clients who last counted towards DAU 28–34 days before enrollment"
select_expression = "COALESCE(DATE_DIFF(MIN(e.enrollment_date), MAX(submission_date), DAY) BETWEEN 28 AND 34, FALSE)"
data_source = "active_users_last_seen"
window_start = -183
window_end = -1

[segments.last_dau_35_to_59_days_ago]
friendly_name = "Last DAU 35 to 59 days ago"
description = "Clients who last counted towards DAU 35–59 days before enrollment"
select_expression = "COALESCE(DATE_DIFF(MIN(e.enrollment_date), MAX(submission_date), DAY) BETWEEN 35 AND 59, FALSE)"
data_source = "active_users_last_seen"
window_start = -183
window_end = -1

[segments.last_dau_60_to_119_days_ago]
friendly_name = "Last DAU 60 to 119 days ago"
description = "Clients who last counted towards DAU 60–119 days before enrollment"
select_expression = "COALESCE(DATE_DIFF(MIN(e.enrollment_date), MAX(submission_date), DAY) BETWEEN 60 AND 119, FALSE)"
data_source = "active_users_last_seen"
window_start = -183
window_end = -1

[segments.last_dau_120_to_179_days_ago]
friendly_name = "Last DAU 120 to 179 days ago"
description = "Clients who last counted towards DAU 120-179 days before enrollment"
select_expression = "COALESCE(DATE_DIFF(MIN(e.enrollment_date), MAX(submission_date), DAY) BETWEEN 120 AND 179, FALSE)"
data_source = "active_users_last_seen"
window_start = -183
window_end = -1

[segments.new_or_last_dau_180plus_days_ago]
friendly_name = "New or last DAU 180+ days ago"
description = """
New Clients, or those whose last DAU before enrollment is >=180 days ago (or no DAU observed in lookback window).
"""
select_expression = """
  (
    MAX(submission_date) IS NULL
    OR DATE_DIFF(MIN(e.enrollment_date), MAX(submission_date), DAY) >= 180
  )
"""
data_source = "active_users_last_seen"
window_start = -183
window_end = -1


[segments.used_splitview_at_least_once]
friendly_name = "Used Splitview at least Once"
description = "Clients who used splitview at least once during the experiment"
select_expression = "LOGICAL_OR(COALESCE(used_splitview, FALSE))"
data_source = "splitview_feature_usage_retention"

[segments.never_used_splitview]
friendly_name = "Never Used Splitview"
description = "Clients who never used splitview the experiment"
select_expression = "NOT LOGICAL_OR(COALESCE(used_splitview, FALSE))"
data_source = "splitview_feature_usage_retention"

[segments.data_sources.active_users_last_seen]
from_expression = """(
  SELECT
    client_id,
    profile_group_id,
    submission_date
  FROM `mozdata.telemetry.desktop_active_users`
  WHERE is_desktop
    AND is_dau
    AND submission_date >= DATE_SUB('2026-03-26', INTERVAL 183 DAY)
)"""
window_start = -183


[data_sources.splitview_feature_usage_retention]
from_expression = """(
    WITH
    feature_usage AS (
        SELECT
            DATE(submission_timestamp) AS submission_date,
            client_id,
            TRUE AS used_splitview,
            ANY_VALUE(event_extra) AS event_extra,
        FROM 
            `moz-fx-data-shared-prod.firefox_desktop.events_stream`
        WHERE 
            event_category = 'splitview'
            AND event_name = 'start'
            AND DATE(submission_timestamp) BETWEEN '2026-03-26' AND '2026-04-30'
        GROUP BY
            ALL
    ),
    week_2_retention AS (
        SELECT
            bse.* EXCEPT(event_extra),
            ANY_VALUE(bse.event_extra) AS event_extra,
            LOGICAL_OR(COALESCE(wke.used_splitview, FALSE)) AS week_2_retained
        FROM
            feature_usage AS bse
        LEFT JOIN
            feature_usage AS wke
        ON
            bse.client_id = wke.client_id
            AND wke.submission_date BETWEEN DATE_ADD(bse.submission_date, INTERVAL 7 DAY) AND DATE_ADD(bse.submission_date, INTERVAL 13 DAY)
        GROUP BY
            ALL
    )
    SELECT
        bse.* EXCEPT(event_extra),
        ANY_VALUE(bse.event_extra) AS event_extra,
        LOGICAL_OR(COALESCE(wke.used_splitview, FALSE)) AS week_4_retained
    FROM
        week_2_retention AS bse
    LEFT JOIN
        feature_usage AS wke
    ON
        bse.client_id = wke.client_id
        AND wke.submission_date BETWEEN DATE_ADD(bse.submission_date, INTERVAL 21 DAY) AND DATE_ADD(bse.submission_date, INTERVAL 27 DAY)
    GROUP BY
        ALL
)"""
description = "Splitview Feature Usage and Retention using 'splitview.start'"
friendly_name = "Splitview Feature Usage and Retention"
client_id_column = "client_id"
experiments_column_type = "events_stream"
