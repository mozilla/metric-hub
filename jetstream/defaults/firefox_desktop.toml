# This defines the default metrics and statistics calculated for each experiment.
#
# ⚠ TEST BRANCH (test-dau-metrics-comparison) — NOT FOR MERGE.
# Trimmed to the SIX DAU/usage/retention metrics under comparison in the
# `experimenter_dau_metrics` investigation (Legacy source only). The full production
# guardrail battery and all Glean twins are intentionally removed so that every test
# experiment resolves to EXACTLY these six metrics (Jetstream config resolution is
# additive — defaults ∪ config ∪ outcomes — so the comparison set must live here).
# See that investigation's metrics.md / PLAN.md. Revert by restoring the production file.

[metrics]
daily = [
  "retained",
  "retained_dau",
  "client_level_daily_active_users_v2",
  "daily_active_users_per_1000_clients_legacy",
]

weekly = [
  "days_of_use",
  "retained",
  "retained_dau",
  "qualified_cumulative_days_of_use",
  "client_level_daily_active_users_v2",
  "daily_active_users_per_1000_clients_legacy",
]

overall = [
  "days_of_use",
  "qualified_cumulative_days_of_use",
  "client_level_daily_active_users_v2",
  "daily_active_users_per_1000_clients_legacy",
]

# Preenrollment week is required so the CUPED-adjusted continuous metrics
# (covariate_adjustment.period = "preenrollment_week") have a covariate to use.
preenrollment_weekly = [
  "days_of_use",
  "qualified_cumulative_days_of_use",
  "client_level_daily_active_users_v2",
  "daily_active_users_per_1000_clients_legacy",
]

[metrics.days_of_use.statistics.linear_model_mean]
drop_highest = 0.0
[metrics.days_of_use.statistics.linear_model_mean.covariate_adjustment]
period = "preenrollment_week"
[metrics.days_of_use.statistics.deciles]
[metrics.days_of_use.statistics.empirical_cdf]


[metrics.retained.statistics.binomial]

[metrics.retained_dau.statistics.binomial]


[metrics.qualified_cumulative_days_of_use.statistics.linear_model_mean]
drop_highest = 0.0
[metrics.qualified_cumulative_days_of_use.statistics.linear_model_mean.covariate_adjustment]
period = "preenrollment_week"
[metrics.qualified_cumulative_days_of_use.statistics.deciles]


[metrics.client_level_daily_active_users_v2.statistics.per_client_dau_impact]
pre_treatments = ['normalize_over_analysis_period']


[metrics.daily_active_users_per_1000_clients_legacy.statistics.linear_model_mean]
# The intended units for 'DAU per 1,000 clients' require that it:
#  a. Be calculated as an average over the time period (such that it matches the *daily* interpretation of DAU)
#  b. Expressly include all rows/values (such that clients who are active on *all* included days are counted as such)
pre_treatments = ['normalize_over_analysis_period']
drop_highest = 0.0
[metrics.daily_active_users_per_1000_clients_legacy.statistics.linear_model_mean.covariate_adjustment]
period = "preenrollment_week"
