# DEV BRANCH `test-glean-vs-legacy-metrics` — NOT FOR PRODUCTION MERGE.
# =====================================================================
# Trimmed/paired Desktop defaults for the Legacy<->Glean guardrail comparison
# (analysis repo: investigations/legacy_glean_metric_comparison, PLAN Stage 2b).
#
# Every guardrail is kept ALONGSIDE its Glean twin, and each twin is given the
# IDENTICAL statistic/period membership as its legacy counterpart, so the two
# versions are computed apples-to-apples and their go/no-go conclusions can be
# compared directly. Pairs (legacy <-> glean):
#   active_hours <-> active_hours_glean
#   ad_clicks <-> ad_click_glean                 (OpMon `ad_click` deliberately excluded)
#   organic_search_count <-> organic_search_count_glean
#   search_count <-> search_count_glean
#   searches_with_ads <-> searches_with_ads_glean
#   tagged_search_count <-> tagged_search_count_glean
#   tagged_follow_on_search_count <-> tagged_follow_on_search_count_glean
#   uri_count_v2 <-> uri_count_v2_glean          (paired on v2; prod default uses uri_count v1)
#       ^^ SCOPE CHANGE TO REPORT: v2 INCLUDES Private Window URIs; the current prod
#          default (v1) EXCLUDES them. Deliberate (defaults should count private-window
#          browsing) but not current default behavior — flag in the final results.
#   is_default_browser <-> is_default_browser_glean
#   client_level_daily_active_users_v2 <-> client_level_daily_active_users_v2_glean
#   active_in_last_3_days_legacy <-> active_in_last_3_days   (inverted naming: unlabelled = Glean)
#   retained <-> retained_glean                  (NEW twin; `retained` deprecated upstream by #1455)
#   retained_dau <-> retained_dau_glean          (NEW twin)
#   unenroll <-> unenroll_glean                  (NEW twin)
# The three NEW twins + the glean_nimbus_events_stream data source are defined in
# definitions/firefox_desktop.toml on this branch.
#
# PRUNED 2026-06-26 (analysis-repo investigation legacy_glean_metric_comparison):
# days_of_use and qualified_cumulative_days_of_use (both legacy + glean) were removed
# to simplify the comparison set, informed by the sibling experimenter_dau_metrics
# investigation. Comparison set is now 14 pairs (was 16).
#
# DEFERRED 2026-06-26 (same investigation) — COMMENTED OUT, NOT DELETED (reversible):
# the SEARCH-FAMILY pairs (search_count, organic_search_count, tagged_search_count,
# tagged_follow_on_search_count, searches_with_ads, ad_clicks) AND the unenroll pair.
# WHY: their Glean twins read RAW EVENT-GRAIN tables — firefox_desktop.events_stream
# (search_count_glean, unenroll_glean) and firefox_desktop.serp_events (the SERP twins) —
# one row per event/impression over the WHOLE population. That scan alone made a single
# analysis window cost ~$19.7 (vs aggregate-table pennies), putting the full 2x2 grid at
# ~$200-400 and too slow to finish in a reasonable horizon. The remaining 7 pairs read only
# DAILY-AGGREGATE tables (clients_daily / baseline_clients_daily / {desktop,baseline}_active_users)
# and are cheap. The deferred set is a KNOWN MAJOR LIMITATION — to be run in a later,
# separately-budgeted pass — and is also where Legacy<->Glean is MOST likely to diverge
# (raw-event vs daily-aggregate grain). Re-enable by stripping the leading "# ".
# ACTIVE comparison set while deferred = 7 pairs (+ twins):
#   client_level_daily_active_users_v2, active_hours, uri_count_v2, is_default_browser,
#   retained, retained_dau, active_in_last_3_days

